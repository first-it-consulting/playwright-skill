name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint --if-present
    
    - name: Run tests
      run: npm test
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: matrix.node-version == '20.x'
      with:
        files: ./coverage/lcov.info
        fail_ci_if_error: false

  validate-skill:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Validate SKILL.md
      run: |
        # Check YAML frontmatter
        if ! grep -q "^---$" SKILL.md; then
          echo "::error::SKILL.md missing YAML frontmatter"
          exit 1
        fi
        
        # Check required fields
        if ! grep -q "^name:" SKILL.md; then
          echo "::error::SKILL.md missing 'name' field"
          exit 1
        fi
        
        if ! grep -q "^description:" SKILL.md; then
          echo "::error::SKILL.md missing 'description' field"
          exit 1
        fi
        
        echo "SKILL.md validation passed"

  build-skill:
    runs-on: ubuntu-latest
    needs: [test, validate-skill]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build skill package
      run: |
        node scripts/package-skill.js . .
        ls -la *.skill
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: playwright-skill
        path: playwright.skill